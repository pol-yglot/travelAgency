<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  xmlns:th="http://www.thymeleaf.org">
<!-- config -->
<th:block th:replace="/layout/static-config :: configFragment"></th:block>
<body class="is-preload">
<!-- Wrapper -->
<div id="wrapper">

	<!-- Header -->
	<header th:replace="~{layout/header :: headerFragment}"></header>

	<!-- Nav -->
	<nav th:replace="/layout/nav :: nav"></nav>

	<!-- Main -->
	<div id="main">
		<div class="inner">
			<section>
				<h2>견적문의</h2>
				<form action="#" method="post">
					<div class="fields">
						<div class="field half">
							<input id="coprNm" name="coprNm" placeholder="회사명" type="text"/>
						</div>
						<div class="field half">
							<input id="name" name="name" placeholder="고객명" type="text"/>
						</div>
						<div class="field half">
							<input id="dept" name="dept" placeholder="소속부서" type="text"/>
						</div>
						<div class="field half">
							<input id="role" name="role" placeholder="직함" type="text"/>
						</div>
						<div class="field half">
							<input id="email" name="email" placeholder="이메일" type="email"/>
						</div>
						<div class="field half">
							<input id="phone" name="phone" placeholder="전화번호" type="text"/>
						</div>
						<div class="field">
							<textarea id="message" name="message" placeholder="메시지"></textarea>
						</div>
						<div class="field">
							<select id="quickQuestSel">
								<option value="">선택하세요</option>
								<option value="">기업 출장 서비스</option>
								<option value="">학회/협회 행사</option>
								<option value="">기타문의</option>
							</select>
						</div>
					</div>
					<ul class="actions">
						<li><input class="primary" type="submit" value="Send"/></li>
					</ul>
				</form>
			</section>
		</div>
	</div>

	<!-- 플로팅 바 -->
	<th:block th:replace="/layout/floatingBtn :: floatingFragment"></th:block>

	<!-- Footer -->
	<footer th:replace="~{layout/footer :: footerFragment}"></footer>


</div>

<!-- Scripts -->
<script th:src="@{/assets/js/jquery.min.js}"></script>
<script th:src="@{/assets/js/browser.min.js}"></script>
<script th:src="@{/assets/js/breakpoints.min.js}"></script>
<script th:src="@{/assets/js/breakpoints.min.js}"></script>
<script th:src="@{/assets/js/main.js}"></script>

</body>
</html>
